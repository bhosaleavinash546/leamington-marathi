name: Deploy CostVision to Fly.io

# Deploys the CostVision container (calculator/) to Fly.io — but only after the CI
# workflow (typecheck + 1000+ tests + build) has passed on the CostVision branch,
# so a red build never ships. Also runnable on demand.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: false      # never cancel a deploy mid-flight

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    # Gate: manual run, OR CI went green on the CostVision branch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'claude/new-session-ts4byp')
    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_run, check out the exact commit CI validated.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: calculator      # build context + fly.toml + Dockerfile live here
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
