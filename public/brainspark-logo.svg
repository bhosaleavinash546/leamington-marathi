<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boltGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Brain left hemisphere -->
  <path d="M50 22 C38 20 26 27 21 38 C16 49 20 60 29 65 C34 68 42 69 50 68"
    stroke="url(#brainGrad)" stroke-width="3.8" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Brain right hemisphere -->
  <path d="M50 22 C62 20 74 27 79 38 C84 49 80 60 71 65 C66 68 58 69 50 68"
    stroke="url(#brainGrad)" stroke-width="3.8" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Brain centre crease -->
  <path d="M50 22 L50 68" stroke="#4f46e5" stroke-width="1.2" opacity="0.35" stroke-dasharray="3,3"/>

  <!-- Brain stem -->
  <path d="M44 68 C42 74 43 80 47 82 C49 83 51 83 53 82 C57 80 58 74 56 68"
    stroke="url(#brainGrad)" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- Sulci / folds -->
  <path d="M28 48 Q34 42 40 46 Q46 50 50 44" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M72 48 Q66 42 60 46 Q54 50 50 44" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Neural nodes -->
  <circle cx="26" cy="44" r="3.2" fill="#38bdf8" opacity="0.95"/>
  <circle cx="37" cy="32" r="2.6" fill="#60a5fa" opacity="0.9"/>
  <circle cx="50" cy="50" r="2.8" fill="#818cf8" opacity="0.9"/>
  <circle cx="63" cy="33" r="2.6" fill="#38bdf8" opacity="0.9"/>
  <circle cx="74" cy="45" r="3.0" fill="#60a5fa" opacity="0.9"/>
  <circle cx="33" cy="58" r="2.0" fill="#7dd3fc" opacity="0.75"/>
  <circle cx="67" cy="59" r="2.0" fill="#7dd3fc" opacity="0.75"/>

  <!-- Neural connections -->
  <line x1="26" y1="44" x2="37" y2="32" stroke="#38bdf8" stroke-width="1.2" opacity="0.45"/>
  <line x1="37" y1="32" x2="50" y2="50" stroke="#60a5fa" stroke-width="1.2" opacity="0.45"/>
  <line x1="50" y1="50" x2="63" y2="33" stroke="#818cf8" stroke-width="1.2" opacity="0.45"/>
  <line x1="63" y1="33" x2="74" y2="45" stroke="#38bdf8" stroke-width="1.2" opacity="0.45"/>
  <line x1="26" y1="44" x2="33" y2="58" stroke="#7dd3fc" stroke-width="1" opacity="0.38"/>
  <line x1="74" y1="45" x2="67" y2="59" stroke="#7dd3fc" stroke-width="1" opacity="0.38"/>

  <!-- Lightning bolt soft glow -->
  <path d="M55 14 L41 50 L51 50 L45 80 L66 44 L55 44 Z"
    fill="#fbbf24" opacity="0.18" transform="translate(-1,-1) scale(1.12)"/>

  <!-- Lightning bolt -->
  <path d="M55 14 L41 50 L51 50 L45 80 L66 44 L55 44 Z"
    fill="url(#boltGrad)" filter="url(#boltGlow)"/>

  <!-- Bolt highlight -->
  <path d="M55 14 L48 34 L55 34 Z" fill="#fef9c3" opacity="0.55"/>
</svg>
