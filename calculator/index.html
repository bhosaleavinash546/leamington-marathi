<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Should-Cost Calculator | Leamington Marathi</title>
</head>
<body>

<header>
  <a class="back-link" href="../index.html">← Back</a>
  <h1>Should-Cost Calculator — Bottom-Up (Phases 1–5)</h1>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <label style="font-size:0.78rem;color:#888;white-space:nowrap">Display Currency</label>
    <select id="currency-selector" style="font-size:0.8rem;padding:3px 7px;border:1px solid #ddd;border-radius:4px">
      <option value="GBP">GBP £</option>
      <option value="EUR">EUR €</option>
      <option value="USD">USD $</option>
      <option value="CNY">CNY ¥</option>
      <option value="INR">INR ₹</option>
      <option value="MXN">MXN $M</option>
    </select>
  </div>
</header>

<div id="validation-errors"   class="validation-box error"   style="display:none;margin:6px 16px 0"></div>
<div id="validation-warnings" class="validation-box warning" style="display:none;margin:4px 16px 0"></div>

<div class="layout">

  <!-- ── Input Panel ──────────────────────────────────────────────────── -->
  <div class="input-panel">

    <!-- Commodity selector tabs -->
    <div class="commodity-tabs" id="commodity-tabs">
      <button class="ctab" data-commodity="cad_analysis" style="background:linear-gradient(135deg,#e65100,#ff8f00);color:#fff;border-color:#e65100">AI CAD ✦</button>
      <button class="ctab active" data-commodity="machining">Machining</button>
      <button class="ctab" data-commodity="sheet_metal">Sheet Metal</button>
      <button class="ctab" data-commodity="injection_moulding" title="Injection moulding — thermoplastics. Includes runner system, tolerance and surface finish multipliers.">Injection</button>
      <button class="ctab" data-commodity="blow_moulding" title="Extrusion blow moulding — hollow parts (bottles, tanks, ducts). HDPE/PP/PET.">Blow Moulding</button>
      <button class="ctab" data-commodity="extrusion" title="Profile/pipe/sheet extrusion — continuous process costed per cut part length.">Extrusion</button>
      <button class="ctab" data-commodity="thermoforming" title="Thermoforming — vacuum/pressure forming of sheet. PS, PET, ABS, PP.">Thermoforming</button>
      <button class="ctab" data-commodity="rotational_moulding" title="Rotational moulding — large hollow parts (tanks, playground equipment). LLDPE powder.">Rotomoulding</button>
      <button class="ctab" data-commodity="casting" title="As-cast parts only (HPDC, sand, gravity, investment). No machining. Use Cast+Machine if subsequent machining is required.">Casting</button>
      <button class="ctab" data-commodity="forging">Forging</button>
      <button class="ctab" data-commodity="painting">Painting</button>
      <button class="ctab" data-commodity="biw_assembly">BIW / Assembly</button>
      <button class="ctab" data-commodity="pcb_fab">PCB Fab</button>
      <button class="ctab" data-commodity="pcba">PCBA / SMD</button>
      <button class="ctab" data-commodity="cast_and_machine" title="Casting + machining in one model. Covers: die cast housing → face mill → bore → drill+tap. Includes post-casting operations (heat treatment, shot blast, impregnation).">Cast+Machine ✓</button>
      <button class="ctab" data-commodity="assembly">Assembly BOM</button>
    </div>

    <!-- Part name (always visible) -->
    <div style="padding:0 4px">
      <div class="field-group">
        <label>Part Name</label>
        <input type="text" id="part-name" value="Unnamed Part" />
      </div>
    </div>

    <!-- Dynamic commodity form area -->
    <div id="commodity-form-area"></div>

    <!-- Universal costs (always visible) -->
    <div id="universal-costs">
      <div class="section-title">Universal Costs</div>
      <div class="field-row">
        <div class="field-group"><label id="lbl-packaging">Packaging (£/part)</label><input type="number" id="packaging" step="0.01" min="0" value="0.15" title="Expendable packaging cost per part — box, foam, dunnage. High-vol: £0.05–0.20, large parts: £0.30–1.50"/></div>
        <div class="field-group"><label id="lbl-logistics">Logistics (£/part)</label><input type="number" id="logistics" step="0.01" min="0" value="0.25" title="Inbound freight from supplier to assembly plant per part. UK–UK: £0.10–0.40, overseas: £0.40–2.00+"/></div>
      </div>
      <div class="field-row" style="margin-top:6px">
        <div class="field-group"><label>Overhead % (SG&amp;A)</label><input type="number" id="overhead-pct" step="0.5" min="0" value="12"/></div>
        <div class="field-group"><label>Margin %</label><input type="number" id="margin-pct" step="0.5" min="0" value="8"/></div>
      </div>
      <div class="field-row" style="margin-top:6px" id="lc-row">
        <div class="field-group"><label>Annual Volume (pcs)</label><input type="number" id="annual-volume" step="1000" min="0" value="10000"/></div>
        <div class="field-group"><label>Learning Curve %</label><input type="number" id="learning-curve-pct" step="1" min="50" max="100" value="85" title="Wright's Law: 85% = 15% cost reduction per doubling of volume"/></div>
      </div>
      <div class="field-row" style="margin-top:4px" id="lc-ref-row">
        <div class="field-group"><label>Reference Volume (pcs)</label><input type="number" id="reference-volume" step="1000" min="1" value="1000" title="Volume at which the base labour cost was estimated"/></div>
        <div class="field-group" style="display:flex;align-items:flex-end;padding-bottom:2px">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
            <input type="checkbox" id="lc-enabled" style="width:auto"/>
            Apply learning curve
          </label>
        </div>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="btn-row">
      <button class="btn btn-primary" id="calc-btn">Calculate</button>
      <button class="btn btn-secondary" id="export-excel-btn" style="display:none" title="Export 6-sheet Excel workbook: Summary, Material, Operations, Machine Rates, Labour Rates, Traceability">Export Excel ↗</button>
      <button class="btn btn-secondary" id="export-pdf-btn"   style="display:none" title="Generate professional PDF report: 5 pages, aPriori-style cost breakdown with full machine rate buildup">PDF Report ↗</button>
      <button class="btn btn-secondary" id="save-scenario-btn" style="display:none">Save Scenario</button>
      <button class="btn btn-secondary" id="load-ref-btn">Load Example</button>
      <button class="btn btn-secondary" id="rates-btn">Edit Rates</button>
    </div>

  </div>

  <!-- ── Results Panel ─────────────────────────────────────────────────── -->
  <div class="results-panel">

    <!-- Results tab bar -->
    <div class="results-tabs" id="results-tabs" style="display:none">
      <button class="rtab active" data-panel="breakdown">Breakdown</button>
      <button class="rtab" data-panel="detail">Detail</button>
      <button class="rtab" data-panel="insights">AI Insights</button>
      <button class="rtab" data-panel="sensitivity">Sensitivity</button>
      <button class="rtab" data-panel="scenarios">Scenarios</button>
    </div>

    <div id="results-breakdown">
      <div class="placeholder">Fill in inputs and click Calculate, or load an example.</div>
    </div>
    <div id="results-detail"      style="display:none"></div>
    <div id="results-insights"    style="display:none"></div>
    <div id="results-sensitivity" style="display:none"></div>
    <div id="results-scenarios"   style="display:none"></div>

  </div>

</div>

<!-- ── Rate Library Modal ────────────────────────────────────────────────── -->
<div id="rate-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px">
  <div style="background:#fff;border-radius:10px;padding:24px;max-width:1100px;width:100%;position:relative">
    <h2 style="font-size:1rem;color:#e65100;margin-bottom:16px">Rate Library — Edit &amp; Version</h2>
    <div id="rate-library-content"></div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-primary" id="apply-rates-btn">Apply Changes</button>
      <button class="btn btn-secondary" id="reset-rates-btn">Reset to Defaults</button>
      <button class="btn btn-secondary" id="close-modal-btn">Cancel</button>
    </div>
  </div>
</div>

<!-- ── Save Scenario Modal ───────────────────────────────────────────────── -->
<div id="scenario-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:10px;padding:24px;max-width:460px;width:100%">
    <h2 style="font-size:1rem;color:#e65100;margin-bottom:16px">Save Scenario</h2>
    <div class="field-group" style="margin-bottom:10px">
      <label>Scenario Name</label>
      <input type="text" id="sc-name" value="Baseline" />
    </div>
    <div class="field-group" style="margin-bottom:16px">
      <label>Description (optional)</label>
      <input type="text" id="sc-desc" value="" />
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="confirm-save-sc">Save</button>
      <button class="btn btn-secondary" id="cancel-save-sc">Cancel</button>
    </div>
  </div>
</div>

<!-- ── Supplier Quote Modal ──────────────────────────────────────────────── -->
<div id="quote-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:10px;padding:24px;max-width:520px;width:100%">
    <h2 style="font-size:1rem;color:#e65100;margin-bottom:16px">Add Supplier Quote</h2>
    <div class="field-row">
      <div class="field-group"><label>Supplier Name</label><input type="text" id="sq-supplier" placeholder="e.g. ABC Machining Ltd"/></div>
      <div class="field-group"><label>Quote Date</label><input type="date" id="sq-date"/></div>
    </div>
    <div class="field-row" style="margin-top:6px">
      <div class="field-group"><label>Quoted Price</label><input type="number" id="sq-price" step="0.01" min="0" placeholder="0.00"/></div>
      <div class="field-group"><label>Currency</label>
        <select id="sq-currency">
          <option value="GBP">GBP £</option>
          <option value="EUR">EUR €</option>
          <option value="USD">USD $</option>
          <option value="INR">INR ₹</option>
          <option value="CNY">CNY ¥</option>
        </select>
      </div>
    </div>
    <div class="field-row" style="margin-top:6px">
      <div class="field-group"><label>FX Rate to GBP</label><input type="number" id="sq-fx" step="0.0001" min="0" value="1"/></div>
      <div class="field-group"><label>Lead Time (days)</label><input type="number" id="sq-lead" step="1" min="0" value="30"/></div>
    </div>
    <div class="field-group" style="margin-top:6px"><label>Notes</label><input type="text" id="sq-notes" placeholder="e.g. Based on 500pcs, 8 wk lead time"/></div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-primary" id="confirm-add-quote">Add Quote</button>
      <button class="btn btn-secondary" id="cancel-add-quote">Cancel</button>
    </div>
  </div>
</div>

<script type="module" src="/src/ui/main.ts"></script>
</body>
</html>
