<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Should-Cost Calculator — Machining | Leamington Marathi</title>
</head>
<body>

<header>
  <a class="back-link" href="../index.html">← Back</a>
  <h1>Should-Cost Calculator — Phase 1: Machining</h1>
</header>

<!-- Validation messages -->
<div id="validation-errors"  class="validation-box error"   style="display:none;margin:8px 16px 0"></div>
<div id="validation-warnings" class="validation-box warning" style="display:none;margin:4px 16px 0"></div>

<div class="layout">

  <!-- ── Input Panel ──────────────────────────────────────────────────── -->
  <div class="input-panel">

    <div>
      <div class="section-title">Part</div>
      <div class="field-group">
        <label>Part Name</label>
        <input type="text" id="part-name" value="Unnamed Part" />
      </div>
    </div>

    <div>
      <div class="section-title">Raw Material</div>
      <div class="field-group" style="margin-bottom:8px">
        <label>Material</label>
        <select id="material-select" class="material-select"></select>
      </div>
      <div class="field-row">
        <div class="field-group">
          <label>Net Weight (kg)</label>
          <input type="number" id="net-weight" step="0.001" min="0" value="0.5" />
        </div>
        <div class="field-group">
          <label>Material Utilisation</label>
          <input type="number" id="mat-util" step="0.01" min="0.01" max="1" value="0.65" />
        </div>
      </div>
      <div style="font-size:0.72rem;color:#888;margin-top:4px">
        Gross weight = net ÷ util. Scrap credit = (gross − net) × scrap price.
      </div>
    </div>

    <div>
      <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>Operations</span>
        <button class="btn btn-secondary btn-sm" id="add-op-btn">+ Add</button>
      </div>
      <div id="operations-container" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>

    <div>
      <div class="section-title">Tooling</div>
      <div class="field-row">
        <div class="field-group">
          <label>Total Tooling Cost (£)</label>
          <input type="number" id="tooling-cost" min="0" step="100" value="15000" />
        </div>
        <div class="field-group">
          <label>Mode</label>
          <select id="tooling-mode">
            <option value="amortized">Amortised</option>
            <option value="one_time_nre">One-time NRE</option>
          </select>
        </div>
      </div>
      <div class="field-group" style="margin-top:6px">
        <label>Amortisation Volume (parts)</label>
        <input type="number" id="amort-vol" min="1" step="1000" value="50000" />
      </div>
    </div>

    <div>
      <div class="section-title">Other Costs</div>
      <div class="field-row">
        <div class="field-group">
          <label>Packaging (£/part)</label>
          <input type="number" id="packaging" step="0.01" min="0" value="0.15" />
        </div>
        <div class="field-group">
          <label>Logistics (£/part)</label>
          <input type="number" id="logistics" step="0.01" min="0" value="0.25" />
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">Overhead &amp; Margin</div>
      <div class="field-row">
        <div class="field-group">
          <label>Overhead % (SG&amp;A)</label>
          <input type="number" id="overhead-pct" step="0.5" min="0" value="12" />
        </div>
        <div class="field-group">
          <label>Margin %</label>
          <input type="number" id="margin-pct" step="0.5" min="0" value="8" />
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="calc-btn">Calculate</button>
      <button class="btn btn-secondary" id="export-btn" style="display:none">Export Excel</button>
      <button class="btn btn-secondary" id="load-ref-btn">Load Reference Part</button>
      <button class="btn btn-secondary" id="rates-btn">Edit Rates</button>
    </div>

  </div>

  <!-- ── Results Panel ─────────────────────────────────────────────────── -->
  <div class="results-panel">
    <div id="results-output">
      <div class="placeholder">Fill in inputs and click Calculate, or load the reference part.</div>
    </div>
  </div>

</div>

<!-- ── Rate Library Modal ────────────────────────────────────────────────── -->
<div id="rate-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px">
  <div style="background:#fff;border-radius:10px;padding:24px;max-width:1000px;width:100%;position:relative">
    <h2 style="font-size:1rem;color:#e65100;margin-bottom:16px">Rate Library — Edit &amp; Version</h2>
    <div id="rate-library-content"></div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-primary" id="apply-rates-btn">Apply Changes</button>
      <button class="btn btn-secondary" id="reset-rates-btn">Reset to Defaults</button>
      <button class="btn btn-secondary" id="close-modal-btn">Cancel</button>
    </div>
  </div>
</div>

<script type="module" src="/src/ui/main.ts"></script>
</body>
</html>
