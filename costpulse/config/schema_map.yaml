# CostPulse canonical schema map.
# Maps messy real-world column headers to canonical fields.
# Matching is case-insensitive and ignores punctuation/whitespace; a fuzzy
# fallback (ratio >= 0.85) catches near-misses. Unmapped columns are reported,
# never silently guessed.
#
# Extend the synonym lists freely — the normaliser reloads this file per run.

canonical_fields:
