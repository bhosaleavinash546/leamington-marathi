# Known commodity vocabulary (used for validation hints only, never enforced).
commodity_vocabulary:
  - casting
  - machining
  - sheet metal
  - plastics
  - pcba
  - fasteners
  - assembly
  - forging
  - stamping
  - e-motor
  - battery
  - wiring harness

# Unit hints: header fragments that imply a unit conversion.
unit_hints:
  grams: ["(g)", " g)", "grams", "in g"]
  per_thousand: ["per 1000", "/1000", "per k pcs", "per 1,000"]
  percent: ["%", "pct", "percent"]
