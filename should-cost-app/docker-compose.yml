version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: should_cost_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    # Port 5433 on the host to avoid clashing with any locally installed PostgreSQL
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/db/schema_v2.sql:/docker-entrypoint-initdb.d/02-schema_v2.sql
      - ./backend/src/db/schema_v3.sql:/docker-entrypoint-initdb.d/03-schema_v3.sql
      - ./backend/src/db/seed_vehicle_hierarchy.sql:/docker-entrypoint-initdb.d/04-seed_hierarchy.sql
      - ./backend/src/db/seed_programs.sql:/docker-entrypoint-initdb.d/05-seed_programs.sql
      - ./backend/src/db/seed_demo_users.sql:/docker-entrypoint-initdb.d/06-seed_users.sql
      - ./backend/src/db/seed_demo_data.sql:/docker-entrypoint-initdb.d/07-seed_demo_data.sql
      - ./backend/src/db/schema_v4.sql:/docker-entrypoint-initdb.d/08-schema_v4.sql
      - ./backend/src/db/schema_v5.sql:/docker-entrypoint-initdb.d/085-schema_v5.sql
      - ./backend/src/db/seed_part_families.sql:/docker-entrypoint-initdb.d/086-seed_part_families.sql
      - ./backend/src/db/seed_should_cost_detail.sql:/docker-entrypoint-initdb.d/09-seed_should_cost_detail.sql
      - ./backend/src/db/schema_v6.sql:/docker-entrypoint-initdb.d/10-schema_v6.sql
      - ./backend/src/db/schema_v7.sql:/docker-entrypoint-initdb.d/11-schema_v7.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d should_cost_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:password@db:5432/should_cost_db
      JWT_SECRET: change_me_for_production
      JWT_EXPIRES_IN: 8h
      NODE_ENV: development
      FRONTEND_ORIGIN: http://localhost:5173
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-costlens@no-reply.local}
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
